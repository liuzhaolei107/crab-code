[advisories]
ignore = [
    # RSA Marvin Attack (timing sidechannel). Transitive via jsonwebtoken 10 →
    # rsa 0.9.10. No safe upgrade published yet. Threat model: the JWT signer
    # runs on loopback for the local session-attach server; there is no
    # network-observable timing signal for an attacker to exploit.
    { id = "RUSTSEC-2023-0071", reason = "rsa via jsonwebtoken, loopback-only usage, no upgrade available" },
    { id = "RUSTSEC-2025-0141", reason = "transitive dep, no safe upgrade available yet" },
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "Unicode-3.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
# Prevent accidental OpenSSL dependency — use rustls for TLS
deny = [
    { crate = "openssl-sys", wrappers = [] },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
