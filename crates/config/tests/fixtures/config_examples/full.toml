#:schema https://raw.githubusercontent.com/lingcoder/crab-code/main/crates/config/assets/config.schema.json

# Full coverage: every documented Config field present at least once so the
# fixture exercises as much of the schema as possible. The rust_defaults
# drift guard does NOT consume this file; it consumes Config::default().

api_provider = "anthropic"
base_url = "https://api.anthropic.com"
api_key_helper = "/usr/local/bin/anthropic-key.sh"

model = "claude-opus-4-7"
small_model = "claude-haiku-4-5"
advisor_model = "claude-haiku-4-5"
available_models = ["claude-opus-4-7", "claude-haiku-4-5"]
model_overrides = { fast = "claude-haiku-4-5", deep = "claude-opus-4-7" }
max_tokens = 8192

permission_mode = "default"

system_prompt = "Be precise."
include_git_instructions = true
custom_instructions = "Always use Rust idioms."

enable_all_project_mcp_servers = false
disable_all_hooks = false

default_shell = "/bin/bash"
theme = "dark"
language = "en-US"
output_style = "concise"
respect_gitignore = true

auto_memory_enabled = true
auto_memory_directory = "memory"

cleanup_period_days = 30

[permissions]
allow = ["Bash(git:*)", "Edit", "Read"]
deny = ["Bash(rm:*)"]
default_mode = "default"
additional_directories = ["/workspace"]

[mcp_servers.github]
url = "https://mcp.github.com"

[mcp_servers.local]
command = "npx"

[hooks]
PreToolUse = [{ command = "echo pre" }]

[env]
HTTP_PROXY = "http://proxy:8080"
ANTHROPIC_BASE_URL = "https://proxy.corp.internal/api"

[git_context]
enabled = true
max_diff_lines = 200

[enabled_plugins]
"superpowers@official" = true
"foo@bar" = [">=1.0", "<2.0"]
